name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    defaults:
      run:
        working-directory: product-service

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build, verify, and run all tests
        run: ./mvnw -B verify

      - name: Upload Surefire test reports
        if: ${{ always() && hashFiles('product-service/target/surefire-reports/**') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: product-service/target/surefire-reports/

      - name: Upload JaCoCo coverage report (optional)
        if: ${{ always() && hashFiles('product-service/target/site/jacoco/**') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: product-service/target/site/jacoco/